<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TicketApp – Panel de administración. Gestión de partidos y sectores." />
  <title>TicketApp | Admin</title>
  <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

</head>

<body class="bg-dark text-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 py-3">
    <span class="navbar-brand fw-bold"><i class="bi bi-ticket-perforated-fill me-2 text-primary"></i>TicketApp <span
        class="badge bg-danger ms-2" style="font-size:.7rem">ADMIN</span></span>
    <button id="btn-logout" class="btn btn-outline-danger btn-sm">
      <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
    </button>
  </nav>

  <main class="container-fluid p-4">
    <h1 class="h4 mb-4">Panel de Administración</h1>
    <p class="text-muted">Módulo <code>admin.js</code> se integrará aquí — gestión de partidos y sectores.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFgFMa+t+7tViXohFD0lDfS60D" crossorigin="anonymous"></script>

  <!--
    auth.js se carga primero: su IIFE llama a requireAuth()
    y redirige si no hay sesión o el rol no es 'admin'.
    admin.js se carga después y puede importar { getSession, logout } de auth.js.
  -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>

</html>
