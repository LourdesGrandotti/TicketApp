<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>

    <div class="container">
        <div>
            <!--ACA VA EL LOGO--->
        </div>
        <h1 class="">Bienvenido</h1>
        <p class="">Inicia sesión para asegurar tu lugar en el próximo partido</p>


        <form id="loginForm">
            <h2 class="">Iniciar Sesión</h2>

            <div class="">
                <label>Correo electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="">
                <label>Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                <button type="button" id="togglePassword">👁️</button>
            </div>



            <button type="submit" class="">Ingresar→</button>



            <div class="">
                <p class="">¿No tienes una cuenta?</p>
                <a href="registro.html" class="">Registrate aquí</a>
            </div>
        </form>
    </div>
</body>

</html>
