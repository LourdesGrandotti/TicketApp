<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="TicketApp – Plataforma de venta de entradas para el Estadio de Fútbol. Inicia sesión para comprar tus entradas." />
  <title>TicketApp | Iniciar Sesión</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <!-- Bootstrap Icons -->
  <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />-->
  <!-- Estilos propios 
  <link rel="stylesheet" href="css/styles.css" />-->
</head>

<body class="ta-login-body d-flex align-items-center justify-content-center min-vh-100">

  <!-- ===== TARJETA DE LOGIN ===== -->
  <main class="ta-login-card card shadow-lg p-4 p-md-5" role="main" aria-label="Formulario de inicio de sesión">

    <!-- Logo / Header -->
    <div class="text-center mb-4">
      <span class="ta-logo-icon"><i class="bi bi-ticket-perforated-fill"></i></span>
      <h1 class="ta-brand mt-2 mb-0">TicketApp</h1>
      <p class="text-muted small">Estadio ... – Portal de Entradas</p>
    </div>

    <!-- Alerta de error (oculta por defecto) -->
    <div id="login-alert" class="alert alert-danger d-none py-2" role="alert" aria-live="assertive">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>
      <span id="login-alert-msg">Credenciales incorrectas.</span>
    </div>

    <!-- Formulario -->
    <form id="login-form" novalidate>

      <!-- Campo: Usuario -->
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">
          <i class="bi bi-person-fill me-1"></i>Usuario
        </label>
        <input type="text" id="username" name="username" class="form-control ta-input" placeholder="Ingresá tu usuario"
          autocomplete="username" required aria-required="true" />
        <div class="invalid-feedback">El campo usuario es obligatorio.</div>
      </div>

      <!-- Campo: Contraseña -->
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">
          <i class="bi bi-lock-fill me-1"></i>Contraseña
        </label>
        <div class="input-group">
          <input type="password" id="password" name="password" class="form-control ta-input"
            placeholder="Ingresá tu contraseña" autocomplete="current-password" required aria-required="true" />
          <!-- Toggle mostrar/ocultar contraseña -->
          <button type="button" id="toggle-password" class="btn btn-outline-secondary"
            aria-label="Mostrar u ocultar contraseña" title="Ver contraseña">
            <i id="toggle-icon" class="bi bi-eye-fill"></i>
          </button>
        </div>
        <div class="invalid-feedback">El campo contraseña es obligatorio.</div>
      </div>

      <!-- Botón submit -->
      <div class="d-grid">
        <button type="submit" id="btn-login" class="btn ta-btn-primary btn-lg">
          <span id="btn-login-text"><i class="bi bi-box-arrow-in-right me-1"></i>Ingresar</span>
          <span id="btn-login-spinner" class="spinner-border spinner-border-sm d-none" role="status"
            aria-hidden="true"></span>
        </button>
      </div>

    </form>

    <!-- Credenciales de demo (visibles en desarrollo) -->
    <div class="ta-demo-hint mt-4 p-3 rounded">
      <p class="mb-1 small fw-semibold text-center">🔑 Credenciales de prueba</p>
      <div class="row text-center small">
        <div class="col-6">
          <span class="badge ta-badge-admin mb-1">ADMIN</span><br />
          <code>admin / admin123</code>
        </div>
        <div class="col-6">
          <span class="badge ta-badge-user mb-1">USUARIO</span><br />
          <code>user / user123</code>
        </div>
      </div>
    </div>

  </main>

  <!-- Bootstrap 5 JS Bundle (incluye Popper) (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFgFMa+t+7tViXohFD0lDfS60D" crossorigin="anonymous"></script>

  <!--
    auth.js se carga como módulo ES6.
    El atributo 'type="module"' habilita import/export y
    aplaza la ejecución hasta que el DOM esté listo (como defer).
  -->
  <script type="module" src="js/auth.js"></script>

</body>

</html>
