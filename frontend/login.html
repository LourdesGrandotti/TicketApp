<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketApp - Iniciar Sesión</title>

    <!-- Favicon Oficial -->
    <link rel="icon" type="image/png" href="img/TicketApp.png">

    <!-- Iconos Externos (Boxicons + Bootstrap Icons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Hoja de Estilos Compartida -->
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body class="auth-bg d-flex flex-column min-vh-100 font-montserrat text-white">

    <!-- Contenedor Principal Formulario -->
    <main class="container my-auto py-5 d-flex justify-content-center align-items-center">
        <div class="w-100" style="max-width: 520px; padding: 20px;">

            <!-- Marca (Logo Oficial) -->
            <div class="mb-5 text-start">
                <a href="home.html">
                    <img src="img/LogoTicketApp.png" alt="TicketApp Logo" class="img-fluid" style="max-height: 55px;">
                </a>
            </div>

            <!-- Título de impacto del screenshot -->
            <h1 class="h2 fw-bold text-uppercase mb-4 text-start lh-sm" style="letter-spacing: 0.5px;">
                COMPRÁ TICKETS AL INSTANTE<br>EN UN SOLO LUGAR
            </h1>

            <!-- Subtítulo de cuenta -->
            <div class="d-flex align-items-center text-white-70 mb-4 fs-6 opacity-75">
                <i class="bx bx-user me-2 fs-5"></i> Ingresá a tu cuenta
            </div>

            <!-- Formulario de inicio de sesión -->
            <form id="loginForm" novalidate>

                <!-- Input de Usuario / Correo con Icono Interno -->
                <div class="mb-3 text-start">
                    <label for="username" class="form-label small fw-medium text-white-70 mb-2">Correo
                        electrónico</label>
                    <div class="auth-input-wrapper">
                        <span class="auth-input-icon"><i class="bx bx-user"></i></span>
                        <input type="text" class="form-control auth-input" id="username"
                            placeholder="Ingresá tu correo electrónico o usuario" required>
                        <div class="invalid-feedback text-danger small mt-1">Este campo es requerido.</div>
                    </div>
                </div>

                <!-- Input de Contraseña con Icono Interno -->
                <div class="mb-4 text-start">
                    <label for="password" class="form-label small fw-medium text-white-70 mb-2">Contraseña</label>
                    <div class="auth-input-wrapper password-container">
                        <span class="auth-input-icon"><i class="bx bx-key"></i></span>
                        <input type="password" class="form-control auth-input password-input" id="password"
                            placeholder="Ingresá tu contraseña" required>
                        <!-- El botón de ver contraseña se inyecta por CSS/JS opcionalmente, pero usamos Boxicons si el script lo requiere -->
                        <button
                            class="position-absolute end-0 top-50 translate-middle-y btn border-0 bg-transparent text-white-50 toggle-password-btn px-3 py-0"
                            type="button" style="z-index: 15;">
                            <i class="bx bx-show fs-5"></i>
                        </button>
                        <div class="invalid-feedback text-danger small mt-1">La contraseña es requerida.</div>
                    </div>
                </div>

                <!-- Mensaje de Alerta inyectado por JS -->
                <p id="authMessage" class="fw-bold small text-center mb-3"></p>

                <!-- Botón de Envío -->
                <button type="submit" id="btn-login-submit"
                    class="btn btn-brand btn-lg w-100 py-3 fw-bold text-uppercase rounded-3 mb-4 shadow-sm fs-6">
                    Ingresá
                </button>

                <!-- Enlace a Registro -->
                <div class="text-center small text-white-50 opacity-75">
                    ¿No tenés cuenta? <a href="registro.html"
                        class="text-brand fw-bold text-decoration-none ms-1 hover-opacity">¡Registrate ahora!</a>
                </div>

            </form>

        </div>
    </main>

    <!-- Footer oficial de la captura -->


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Ruta de verificación de accesos -->
    <script type="module" src="assets/js/modules/auth.js"></script>
    <!-- Lógica de autenticación del formulario -->
    <script type="module" src="assets/js/modules/login.js"></script>
</body>

</html>
