<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TicketApp – Seleccioná tu sector en el mapa del estadio.">
  <title>TicketApp | Selección de Entradas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Boxicons CDN -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/nulshock" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <!-- Sección del Navbar -->
  <header class="d-flex flex-wrap justify-content-between align-items-center px-4 py-3 border-bottom shadow-sm">
    <div class="d-flex align-items-center gap-3 col-12 col-md-6 mb-3 mb-md-0">
      <!-- Logo -->
      <a href="home.html">
        <img src="assets/img/LogoTicketApp.png" alt="Logo TicketApp" class="img-fluid object-fit-contain" width="140" height="40">
      </a>

      <!-- Buscador -->
      <div class="input-group flex-nowrap w-75" id="nav-search">
        <span class="input-group-text bg-white border-end-0 rounded-start-pill text-muted px-3"><i class='bx bx-search'></i></span>
        <input type="text" class="form-control border-start-0 rounded-end-pill shadow-none" placeholder="Buscar partidos o países">
      </div>
    </div>

    <div class="d-flex align-items-center justify-content-end gap-3 col-12 col-md-6">
      <a href="perfil.html" id="nav-account" class="text-decoration-none text-dark small fw-medium text-nowrap">Ver mi cuenta</a>

      <a href="carrito.html" id="nav-cart" class="text-decoration-none position-relative me-2" style="color: #ed194d;">
        <i class='bx bx-cart fs-4'></i>
        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill border border-dark bg-light text-dark p-1 d-none"></span>
      </a>

      <span id="nav-divider" class="text-secondary">|</span>

      <a href="login.html" onclick="localStorage.removeItem('userToken'); localStorage.removeItem('isLoggedIn');" id="nav-auth-btn" class="btn btn-brand rounded-pill fw-bold text-nowrap px-4 py-2">Cerrar sesión</a>
    </div>
  </header>

  <!-- Banner con información del partido -->
  <div class="ta-match-bar" id="match-bar" aria-label="Información del partido"></div>

  <!-- Sección principal con grilla Bootstrap para alinear el mapa y el detalle del sector -->
  <main class="container-fluid py-4">
    
    <!-- Botón Volver -->
    <div class="ta-volver-wrap">
      <a href="partidos.html" class="ta-btn-volver">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
    </div>

    <div class="row">

      <!-- Columna del estadio -->
      <div class="col-lg-7 text-center position-relative mb-4 mb-lg-0 ta-stadium-col">

        <div class="ta-map-wrapper">
          <div class="ta-zoom-panel" aria-label="Herramientas de zoom">
            <button class="ta-zoom-btn" id="zoom-in" type="button">+</button>
            <button class="ta-zoom-btn" id="zoom-out" type="button">−</button>
          </div>

          <svg id="stadium-map" viewBox="0 0 580 490" width="100%" aria-label="Mapa interactivo del estadio"></svg>
        </div>

        <div class="ta-legend" role="list" aria-label="Leyenda del mapa">
          <div class="ta-legend-item" role="listitem">
            <span class="ta-leg-box unavailable-box"></span>
            No disponible
          </div>
          <div class="ta-legend-item" role="listitem">
            <span class="ta-leg-box available-box"></span>
            Disponible
          </div>
          <div class="ta-legend-item" role="listitem">
            <span class="ta-leg-box selected-box"></span>
            Sector seleccionado
          </div>
        </div>
      </div>

      <!-- Tabla de precios -->
      <div class="col-lg-5 ta-panel-col hidden-panel" id="details-panel">
        <div class="ta-table-hdr" role="row">
          <div class="tr-sector">Sector</div>
          <div class="tr-qty">Cantidad</div>
          <div class="tr-price">Precio</div>
          <div class="tr-cart"></div>
        </div>

        <div id="rows-container" role="list" aria-label="Filas del sector seleccionado"></div>

        <div class="ta-continuar-wrap">
          <button class="ta-btn-continuar" id="btn-continuar" type="button" disabled>Continuar</button>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="ta-footer" role="contentinfo">
    <img src="assets/img/logoticketappblanco.png" alt="TicketApp" class="ta-footer-logo" style="width: 120px; object-fit: contain;">
    <div class="ta-footer-copy text-white mx-auto text-center small">
      &copy; 2026 Todos los derechos reservados.
    </div>
    <div style="width: 120px;" class="d-none d-md-block"></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/modules/matches.js"></script>
  <script>
    // Interceptar la redirección del botón Continuar para inyectar la cantidad de entradas elegida
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('btn-continuar');
      if (btn) {
        btn.addEventListener('click', (e) => {
          // Detener el handler onclick de matches.js
          e.preventDefault();
          e.stopImmediatePropagation();
          
          const select = document.querySelector('.ta-qty-sel');
          const cant = select ? select.value : '1';
          
          // Buscar el sector que está seleccionado en el DOM
          const rowItem = document.querySelector('.ta-row-item');
          const sid = rowItem ? rowItem.dataset.sector : 'A1';
          
          // Re-construir la redirección incluyendo el parámetro 'cant'
          const params = new URLSearchParams(location.search);
          const idPartido = params.get('partido') || '';
          
          const url = idPartido
            ? `asientos.html?sector=${sid}&partido=${idPartido}&cant=${cant}`
            : `asientos.html?sector=${sid}&cant=${cant}`;
          
          location.href = url;
        }, true); // Fase de captura para ejecutarse antes de la asignación onclick
      }
    });
  </script>
</body>

</html>
