<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TicketApp – Seleccioná tu sector en el mapa del estadio.">
  <title>TicketApp | Selección de Entradas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/nulshock" rel="stylesheet">
  <style>
    :root {
      --primary: #ed194d;
      --dark: #4d4d4d;
      --light: #fefefe;
    }

    body {
      background-color: var(--light);
      font-family: 'Montserrat', sans-serif;
      color: var(--dark);
      margin: 0;
      padding: 0;
    }

    /* Barra de navegación */
    .ta-navbar {
      background-color: var(--light);
      border-bottom: 1px solid #eaeaea;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .ta-logo {
      height: 38px;
    }

    .ta-nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .ta-nav-link {
      font-weight: 600;
      font-size: 12pt;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .ta-nav-link:hover {
      color: var(--primary);
    }

    .ta-btn-ingresar {
      background-color: var(--primary);
      color: var(--light);
      font-weight: 600;
      font-size: 12pt;
      border: none;
      border-radius: 8px;
      padding: 8px 24px;
      cursor: pointer;
    }

    .ta-nav-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .ta-nav-profile i {
      font-size: 1.3rem;
      color: #999;
    }

    /* Banner con información del partido */
    .ta-match-bar {
      background-color: var(--primary);
      padding: 14px 40px;
    }

    .ta-bar-inner {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .ta-bar-flags {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ta-flag-img {
      width: 44px;
      height: 28px;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(255, 255, 255, 0.2);
    }

    .ta-flag-placeholder {
      width: 44px;
      height: 28px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .ta-bar-vs {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12pt;
    }

    .ta-bar-sep {
      width: 1.5px;
      height: 48px;
      background-color: rgba(255, 255, 255, 0.3);
    }

    .ta-bar-info {
      color: white;
    }

    .ta-bar-dt {
      font-weight: 600;
      font-size: 13pt;
      margin-bottom: 2px;
    }

    .ta-bar-venue {
      font-size: 10.5pt;
      opacity: 0.9;
    }

    .ta-bar-city {
      font-size: 9.5pt;
      opacity: 0.7;
    }

    /* Contenedor interactivo de mapa del estadio */
    .ta-map-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      background-color: #fcfcfc;
      padding: 15px;
    }

    .ta-zoom-panel {
      position: absolute;
      top: 15px;
      left: 15px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .ta-zoom-btn {
      width: 32px;
      height: 32px;
      background-color: white;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      font-size: 14pt;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .ta-zoom-btn:hover {
      background-color: #f5f5f5;
    }

    #stadium-map {
      transition: transform 0.2s ease;
      display: block;
      width: 100%;
      height: auto;
      max-height: 470px;
    }

    /* Transición de sectores */
    .st-sec {
      transition: transform 0.2s ease-in-out;
    }

    .ta-legend {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
      margin-top: 24px;
    }

    .ta-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10pt;
    }

    .ta-leg-box {
      width: 22px;
      height: 22px;
      border-radius: 4px;
    }

    /* Encabezado de la tabla de detalles */
    .ta-table-hdr {
      display: flex;
      align-items: center;
      padding: 0 10px 12px;
      font-weight: 600;
      font-size: 10.5pt;
      color: #999;
      border-bottom: 2px solid #efefef;
      margin-bottom: 12px;
    }

    .tr-sector {
      flex: 1.8;
    }

    .tr-fila {
      flex: 1;
      text-align: center;
    }

    .tr-qty {
      flex: 1.6;
      text-align: center;
    }

    .tr-price {
      flex: 1.8;
      text-align: right;
    }

    .tr-cart {
      width: 40px;
    }

    /* Elementos de fila de asientos */
    .ta-row-item {
      display: flex;
      align-items: center;
      border: 2px solid #b3b3b3;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 11pt;
    }

    .ta-row-item:hover {
      border-color: var(--primary);
    }

    .ta-row-item.sel-row {
      border-color: var(--primary);
      box-shadow: 0 0 0 2.5px rgba(237, 25, 77, 0.08);
    }

    .ta-row-item .tr-sector {
      font-weight: 600;
      color: var(--dark);
    }

    .ta-row-item .tr-fila {
      text-align: center;
      color: #666;
    }

    .ta-row-item .tr-qty {
      display: flex;
      justify-content: center;
    }

    .ta-row-item .tr-price {
      text-align: right;
      font-weight: 600;
      color: var(--dark);
    }

    .ta-row-item .tr-cart {
      text-align: right;
    }

    .ta-qty-sel {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 10pt;
      background-color: white;
      cursor: pointer;
    }

    .ta-qty-sel:disabled {
      background-color: #f2f2f2;
      color: #aaa;
      cursor: default;
      border-color: #ddd;
    }

    .ta-cart-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .ta-cart-btn i {
      font-size: 1.3rem;
    }

    /* Botón de continuar ubicado directamente debajo de las filas */
    .ta-continuar-wrap {
      margin-top: 16px;
      padding-top: 10px;
    }

    .ta-btn-continuar {
      width: 100%;
      background-color: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 13pt;
      border: none;
      border-radius: 50px;
      padding: 14px 0;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .ta-btn-continuar:hover:not(:disabled) {
      opacity: 0.9;
    }

    .ta-btn-continuar:disabled {
      background-color: #ccc;
      cursor: default;
    }

    /* Footer */
    .ta-footer {
      background-color: var(--primary);
      padding: 40px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ta-footer-logo {
      height: 38px;
    }

    .ta-footer-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }

    .ta-footer-link {
      font-weight: 600;
      font-size: 11pt;
      color: white;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .ta-footer-link:hover {
      opacity: 0.8;
      color: white;
    }

    @media (max-width: 900px) {
      .ta-main {
        flex-direction: column;
      }

      .ta-stadium-col {
        border-right: none;
        border-bottom: 1px solid #efefef;
        padding: 20px;
      }

      .ta-panel-col {
        padding: 20px;
      }

      .ta-zoom-panel {
        left: 20px;
        top: 20px;
      }

      .ta-footer {
        padding: 30px 40px;
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }

      .ta-footer-links {
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <!-- Barra de navegación -->
  <nav class="ta-navbar" role="navigation" aria-label="Navegación principal">
    <a href="partidos.html"><img src="img/LogoTicketApp.png" alt="TicketApp" class="ta-logo"></a>
    <div class="ta-nav-links">
      <a href="partidos.html" class="ta-nav-link">Calendario</a>
      <a href="perfil.html" class="ta-nav-link">Mis entradas</a>
      <button class="ta-btn-ingresar" type="button">Ingresar</button>
      <div class="ta-nav-profile" role="button" aria-label="Perfil">
        <i class="bi bi-person-fill"></i>
      </div>
    </div>
  </nav>

  <!-- Banner con información del partido -->
  <div class="ta-match-bar" id="match-bar" aria-label="Información del partido"></div>

  <!-- Sección principal con grilla Bootstrap para alinear el mapa y el detalle del sector -->
  <main class="container-fluid py-4">
    <div class="row">

      <!-- Columna del estadio -->
      <div class="col-lg-7 text-center position-relative mb-4 mb-lg-0" style="padding-left: 40px;">

        <div class="ta-map-wrapper">
          <div class="ta-zoom-panel" aria-label="Herramientas de zoom">
            <button class="ta-zoom-btn" id="zoom-in" type="button">+</button>
            <button class="ta-zoom-btn" id="zoom-out" type="button">−</button>
          </div>

          <svg id="stadium-map" viewBox="0 0 580 490" width="100%" aria-label="Mapa interactivo del estadio"></svg>
        </div>

        <div class="ta-legend" role="list" aria-label="Leyenda del mapa">
          <div class="ta-legend-item" role="listitem">
            <span class="ta-leg-box" style="background-color:#eaeaea; border:1px solid #d0d0d0;"></span>
            No disponible
          </div>
          <div class="ta-legend-item" role="listitem">
            <span class="ta-leg-box" style="background-color:#d5d5d5; border:1px solid #b3b3b3;"></span>
            Disponible
          </div>
        </div>
      </div>

      <!-- Tabla de precios -->
      <div class="col-lg-5" style="padding-right: 40px;">
        <div class="ta-table-hdr" role="row">
          <div class="tr-sector">Sector</div>
          <div class="tr-fila">Fila</div>
          <div class="tr-qty">Cantidad</div>
          <div class="tr-price">Precio</div>
          <div class="tr-cart"></div>
        </div>

        <div id="rows-container" role="list" aria-label="Filas del sector seleccionado"></div>

        <div class="ta-continuar-wrap">
          <button class="ta-btn-continuar" id="btn-continuar" type="button" disabled>Continuar</button>
        </div>
      </div>

    </div>
  </main>

  <!-- Lógica del script de zoom -->
  <script>
    (() => {
      let currentScale = 1;
      const map = document.getElementById('stadium-map');
      document.getElementById('zoom-in').onclick = () => {
        currentScale = Math.min(currentScale + 0.15, 1.8);
        map.style.transform = `scale(${currentScale})`;
        map.style.transformOrigin = 'center center';
      };
      document.getElementById('zoom-out').onclick = () => {
        currentScale = Math.max(currentScale - 0.15, 0.7);
        map.style.transform = `scale(${currentScale})`;
        map.style.transformOrigin = 'center center';
      };
    })();
  </script>

  <!-- Footer -->
  <footer class="ta-footer" role="contentinfo">
    <img src="img/logoticketappblanco.png" alt="TicketApp" class="ta-footer-logo">
    <div class="ta-footer-links">
      <a href="partidos.html" class="ta-footer-link">Calendario</a>
      <a href="perfil.html" class="ta-footer-link">Mis entradas</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/modules/matches.js"></script>
</body>

</html>
