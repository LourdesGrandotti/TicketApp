<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>


<body class="d-flex flex-column justify-content-center min-vh-100 p-3">

    <div class="container rounded-4 shadow-lg p-4 p-md-5 m-auto">
        <div class="text-center mb-3">
            <!--ACA VA EL LOGO (Igual que en el Login)--->
        </div>
        <h1 class="mb-4 text-center fw-bold fs-3">Crea tu cuenta</h1>

        <form id="registerForm">

            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control py-2" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control py-2" id="username" placeholder="Mi_usuario" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="position-relative password-container">
                    <input type="password" class="form-control py-2 password-input" id="password" placeholder="Contraseña" required>
                    <button type="button" class="toggle-password-btn"></button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar contraseña</label>
                <div class="position-relative password-container">
                    <input type="password" class="form-control py-2 password-input" id="confirmedPassword"
                        placeholder="Contraseña" required>
                    <button type="button" class="toggle-password-btn"></button>
                </div>
            </div>

            <button type=" submit" class="btn btn-dark w-100 py-2 fw-semibold mt-2">Registrarse→</button>

            <div class="text-center mt-4 border-top pt-3 border-dark-subtle opacity-75">
                <p class="mb-2 small text-secondary">¿Ya tienes cuenta?</p>
                <!-- Botón estilizado idéntico al de registro en la otra vista -->
                <a href="login.html" class="btn btn-outline-dark btn-sm">Iniciar sesión</a>
            </div>
        </form>
    </div>
    <script src=login.js></script>


</body>
