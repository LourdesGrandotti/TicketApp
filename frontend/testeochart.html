<!-- ESTO SERÁ ELIMINADO, LO ESTOY USANDO PARA VISUALIZAR LOS GRÁFICOS DISPONIBLES EN LA LIBRERÍA CHART -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Gráficos con Chart.js</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .contenedor-graficos {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .grafico-caja {
            width: 400px;
            height: 400px;
        }
    </style>
</head>

<body>

    <h2 style="text-align: center;">Ejemplo de Gráficos con Chart.js</h2>

    <div class="contenedor-graficos">
        <div class="grafico-caja">
            <canvas id="graficoBarras"></canvas>
        </div>

        <div class="grafico-caja">
            <canvas id="graficoTorta"></canvas>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DEL GRÁFICO DE BARRAS ---
        const ctxBarras = document.getElementById('graficoBarras').getContext('2d');
        const graficoBarras = new Chart(ctxBarras, {
            type: 'bar', // Definimos que es de barras
            data: {
                labels: ['Enero', 'Febrero', 'Marzo', 'Abril'], // Etiquetas del eje X
                datasets: [{
                    label: 'Ventas de Tecnología ($)',
                    data: [1200, 1900, 3000, 500], // Los datos numéricos
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.7)',
                        'rgba(54, 162, 235, 0.7)',
                        'rgba(255, 206, 86, 0.7)',
                        'rgba(75, 192, 192, 0.7)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true } // El eje Y empieza en 0
                }
            }
        });

        // --- CONFIGURACIÓN DEL GRÁFICO DE TORTA (PIE) ---
        const ctxTorta = document.getElementById('graficoTorta').getContext('2d');
        const graficoTorta = new Chart(ctxTorta, {
            type: 'pie', // Definimos que es de torta
            data: {
                labels: ['Manzanas', 'Bananas', 'Naranjas'],
                datasets: [{
                    data: [45, 25, 30], // Porcentajes o cantidades
                    backgroundColor: [
                        '#ff6384',
                        '#36a2eb',
                        '#ffce56'
                    ]
                }]
            },
            options: {
                responsive: true
            }
        });
    </script>

</body>

</html>
