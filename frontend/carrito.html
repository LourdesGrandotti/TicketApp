<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TicketApp – Proceso de compra de entradas. Finalizá tu pago de forma segura." />
    <title>TicketApp | Mi Carrito</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Boxicons CDN -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.cdnfonts.com/css/nulshock" rel="stylesheet" />
    <!-- Estilos propios del carrito -->
    <link rel="stylesheet" href="assets/css/carrito.css" />
</head>

<body class="d-flex flex-column min-vh-100 bg-white">

    <!-- Sección del Navbar -->
    <header class="d-flex flex-wrap justify-content-between align-items-center px-4 py-3 border-bottom shadow-sm">
        <div class="d-flex align-items-center gap-3 col-12 col-md-6 mb-3 mb-md-0">
            <!-- Logo -->
            <a href="home.html">
                <img src="assets/img/LogoTicketApp.png" alt="Logo TicketApp" class="img-fluid object-fit-contain" width="140" height="40">
            </a>

            <!-- Buscador -->
            <div class="input-group flex-nowrap w-75" id="nav-search">
                <span class="input-group-text bg-white border-end-0 rounded-start-pill text-muted px-3"><i class='bx bx-search'></i></span>
                <input type="text" class="form-control border-start-0 rounded-end-pill shadow-none" placeholder="Buscar partidos o países">
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-end gap-3 col-12 col-md-6">
            <a href="perfil.html" id="nav-account" class="text-decoration-none text-dark small fw-medium text-nowrap">Ver mi cuenta</a>

            <a href="carrito.html" id="nav-cart" class="text-decoration-none position-relative me-2" style="color: #ed194d;">
                <i class='bx bx-cart fs-4'></i>
                <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill border border-dark bg-light text-dark p-1 d-none"></span>
            </a>

            <span id="nav-divider" class="text-secondary">|</span>

            <a href="login.html" id="btn-logout" class="btn btn-brand rounded-pill fw-bold text-nowrap px-4 py-2">Cerrar sesión</a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container my-2 flex-grow-1" style="max-width: 800px;">
        <h1 class="checkout-main-title text-center mt-3 mb-0">Carrito de Compra</h1>
        <div id="modulo-checkout"></div>
    </main>

    <!-- Footer -->
    <footer class="custom-footer mt-auto">
        <div class="footer-container d-flex justify-content-between align-items-center flex-wrap gap-3">
            <img src="assets/img/logoticketappblanco.png" alt="TicketApp Logo" style="height: 35px; object-fit: contain;" />
            <p class="footer-copy m-0 text-center mx-auto">&copy; 2026 Todos los derechos reservados.</p>
            <div style="width: 120px;" class="d-none d-md-block"></div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Orquestador del flujo de checkout -->
    <script type="module" src="assets/js/modules/checkout.js"></script>
</body>

</html>
