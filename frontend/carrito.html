<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="TicketApp – Proceso de compra de entradas. Finalizá tu pago de forma segura." />
        <title>TicketApp | Mi Carrito</title>

        <!-- Bootstrap 5 CSS CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <!-- Bootstrap Icons CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
        <!-- Montserrat Google Font Fallback -->
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet" />
        <!-- Estilos propios -->
        <link rel="stylesheet" href="css/styles.css" />
    </head>

    <body class="d-flex flex-column min-vh-100 bg-white">

        <!-- Header / Navbar Rediseñado -->
        <nav class="navbar navbar-expand navbar-light bg-white custom-header shadow-sm mb-4" style="border-bottom: 4px solid var(--rojo) !important;">
            <div class="container d-flex justify-content-between align-items-center">
                <a class="navbar-brand" href="home.html">
                    <img src="assets/images/image(1).png" alt="TicketApp Logo" style="height: 30px; object-fit: contain;" />
                </a>
                <div class="d-flex align-items-center gap-3">
                    <div class="cart-active-icon d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; border-radius: 50%; background-color: rgba(237, 25, 77, 0.1); color: var(--rojo); box-shadow: 0 0 8px rgba(237, 25, 77, 0.2);" title="Carrito (Sección Activa)">
                        <i class="bi bi-cart3" style="font-size: 1.25rem;"></i>
                    </div>
                    <button id="btn-logout" class="btn-ingresar">Cerrar sesión</button>
                    <div class="avatar-circle">
                        <i class="bi bi-person"></i>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Container -->
        <main class="container my-2 flex-grow-1" style="max-width: 800px;">
            <h1 class="checkout-main-title text-center mt-3 mb-0">Carrito de Compra</h1>
            <div id="modulo-checkout"></div>
        </main>

        <!-- Footer Rediseñado -->
        <footer class="custom-footer mt-auto" style="padding: 1.5rem 1.5rem !important;">
            <div class="container-fluid d-flex flex-column flex-md-row align-items-center justify-content-center position-relative">
                <div class="mb-3 mb-md-0 logo-wrapper">
                    <img src="assets/images/image(1).png" alt="TicketApp Logo" style="height: 30px; object-fit: contain; filter: brightness(0) invert(1);" />
                </div>
                <div class="text-center w-100 copyright-wrapper">
                    <p class="footer-copy m-0 text-nowrap">© 2026 Todos los derechos reservados</p>
                </div>
            </div>
            <style>
                @media (min-width: 768px) {
                    .logo-wrapper {
                        position: absolute;
                        left: 2rem;
                    }
                }
            </style>
        </footer>

        <!-- Bootstrap 5 JS Bundle CDN -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Orquestador del flujo de checkout -->
        <script type="module" src="js/modules/checkout.js"></script>
    </body>

</html>
