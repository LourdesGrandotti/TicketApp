<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TicketApp – Calendario de partidos del Mundial FIFA 2026.">
  <title>TicketApp | Calendario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/nulshock" rel="stylesheet">
  <style>
    :root {
      --primary: #ed194d;
      --dark: #4d4d4d;
      --light: #fefefe;
      --card-bg: #e6e6e6;
    }

    body {
      background-color: var(--light);
      font-family: 'Montserrat', sans-serif;
      color: var(--dark);
      margin: 0;
      padding: 0;
    }

    /* Barra de navegación */
    .ta-navbar {
      background-color: var(--light);
      border-bottom: 1px solid #eaeaea;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .ta-logo {
      height: 38px;
    }

    .ta-nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .ta-nav-link {
      font-weight: 600;
      font-size: 12pt;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .ta-nav-link:hover,
    .ta-nav-link.active {
      color: var(--primary);
    }

    .ta-btn-ingresar {
      background-color: var(--primary);
      color: var(--light);
      font-weight: 600;
      font-size: 12pt;
      border: none;
      border-radius: 8px;
      padding: 8px 24px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .ta-btn-ingresar:hover {
      opacity: 0.9;
    }

    .ta-nav-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .ta-nav-profile i {
      font-size: 1.3rem;
      color: #999;
    }

    /* Banner del héroe */
    .ta-hero {
      position: relative;
      height: 480px;
      overflow: hidden;
    }

    .ta-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }

    .ta-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--primary) 0%, rgba(237, 25, 77, 0.4) 50%, rgba(237, 25, 77, 0) 100%);
      pointer-events: none;
    }

    .ta-hero-text {
      position: absolute;
      bottom: 40px;
      left: 40px;
      font-family: 'Nulshock', sans-serif;
      font-weight: 700;
      font-size: 80pt;
      color: var(--light);
      line-height: 1;
      text-transform: uppercase;
    }

    /* Área de contenido */
    .ta-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    .ta-section-title {
      font-family: 'Nulshock', sans-serif;
      font-weight: 700;
      font-size: 27pt;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* Filtro de fases */
    .ta-filter-pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .ta-phase-btn {
      background-color: transparent;
      border: 2px solid #ccc;
      border-radius: 50px;
      font-weight: 600;
      font-size: 11pt;
      color: var(--dark);
      padding: 8px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .ta-phase-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .ta-phase-btn.active {
      background-color: var(--primary);
      border-color: var(--primary);
      color: var(--light);
    }

    /* Tarjetas de partidos */
    .ta-match-card {
      background-color: var(--card-bg);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-direction: column;
    }

    .ta-card-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .ta-card-teams {
      display: flex;
      align-items: center;
      gap: 24px;
      min-width: 320px;
    }

    .ta-team-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 130px;
      text-align: center;
    }

    .ta-flag-img {
      width: 46px;
      height: 29px;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      margin-bottom: 8px;
    }

    .ta-flag-placeholder {
      width: 46px;
      height: 29px;
      background-color: #d0d0d0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .ta-tname {
      font-family: 'Nulshock', sans-serif;
      font-weight: 700;
      font-size: 10pt;
      color: var(--dark);
      text-transform: uppercase;
      word-wrap: break-word;
    }

    .ta-vs {
      font-weight: 600;
      font-size: 11pt;
      color: #999;
      text-transform: uppercase;
    }

    .ta-card-sep {
      width: 1.5px;
      background-color: #ccc;
      align-self: stretch;
    }

    .ta-card-info {
      flex: 1;
      min-width: 240px;
    }

    .ta-dt {
      font-weight: 600;
      font-size: 12pt;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .ta-st {
      font-weight: 400;
      font-size: 11pt;
      color: var(--dark);
      margin-bottom: 2px;
    }

    .ta-ci {
      font-weight: 400;
      font-size: 10pt;
      color: var(--dark);
      opacity: 0.5;
    }

    .ta-btn-comprar {
      background-color: var(--primary);
      color: var(--light);
      border: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 11pt;
      padding: 12px 28px;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      transition: opacity 0.2s ease;
    }

    .ta-btn-comprar:hover {
      opacity: 0.9;
      color: var(--light);
    }

    .ta-btn-proximo {
      background-color: #c8c8c8;
      color: #666;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 11pt;
      padding: 12px 28px;
      cursor: default;
      display: inline-block;
      text-align: center;
    }

    .ta-card-venta {
      background-color: #dcdcdc;
      border-top: 1px solid #ccc;
      padding: 8px 24px;
      font-size: 9.5pt;
      color: #777;
    }

    /* Pie de página */
    .ta-footer {
      background-color: var(--primary);
      padding: 40px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ta-footer-logo {
      height: 42px;
    }

    .ta-footer-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }

    .ta-footer-link {
      font-weight: 600;
      font-size: 11pt;
      color: white;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .ta-footer-link:hover {
      opacity: 0.8;
      color: white;
    }

    @media (max-width: 768px) {
      .ta-navbar {
        padding: 10px 20px;
      }

      .ta-hero-text {
        font-size: 46pt;
        left: 20px;
        bottom: 20px;
      }

      .ta-container {
        padding: 32px 20px;
      }

      .ta-card-body {
        flex-direction: column;
        align-items: stretch;
      }

      .ta-card-sep {
        display: none;
      }

      .ta-card-teams {
        justify-content: center;
      }

      .ta-footer {
        padding: 30px 40px;
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }

      .ta-footer-links {
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <!-- Barra de navegación -->
  <nav class="ta-navbar" role="navigation" aria-label="Navegación principal">
    <a href="partidos.html"><img src="img/LogoTicketApp.png" alt="TicketApp" class="ta-logo"></a>
    <div class="ta-nav-links">
      <a href="partidos.html" class="ta-nav-link active">Calendario</a>
      <a href="perfil.html" class="ta-nav-link">Mis entradas</a>
      <button class="ta-btn-ingresar" type="button">Ingresar</button>
      <div class="ta-nav-profile" role="button" aria-label="Perfil">
        <i class="bi bi-person-fill"></i>
      </div>
    </div>
  </nav>

  <!-- Banner del hero (img fondo)-->
  <header class="ta-hero">
    <img src="img/estadio-hero.jpg" alt="Estadio de fútbol" class="ta-hero-img">
    <div class="ta-hero-overlay"></div>
    <h1 class="ta-hero-text">Calendario</h1>
  </header>

  <!-- Sección del calendario -->
  <main class="ta-container">
    <h2 class="ta-section-title">Calendario de Partidos</h2>

    <!-- Filtro de fases -->
    <div class="ta-filter-pills" role="group" aria-label="Filtro por fase">
      <button class="ta-phase-btn active" data-phase="16avos" type="button">16avos</button>
      <button class="ta-phase-btn" data-phase="8avos" type="button">8avos</button>
      <button class="ta-phase-btn" data-phase="4tos" type="button">4tos</button>
      <button class="ta-phase-btn" data-phase="semifinal" type="button">Semifinal</button>
      <button class="ta-phase-btn" data-phase="final" type="button">Final</button>
    </div>

    <!-- Contenedor de lista de partidos -->
    <div id="matches-container" role="list"></div>
  </main>

  <!-- Pie de página -->
  <footer class="ta-footer" role="contentinfo">
    <img src="img/logoticketappblanco.png" alt="TicketApp" class="ta-footer-logo">
    <div class="ta-footer-links">
      <a href="partidos.html" class="ta-footer-link">Calendario</a>
      <a href="perfil.html" class="ta-footer-link">Mis entradas</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/modules/matches.js"></script>
</body>

</html>
