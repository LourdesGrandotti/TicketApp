<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TicketApp – Elegí tus asientos en el sector seleccionado.">
  <title>TicketApp | Selección de Asientos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/nulshock" rel="stylesheet">
  <style>
    /* -----------------------------------------------------------------------
       Variables y reset — idénticos a estadio.html y partidos.html
    ----------------------------------------------------------------------- */
    :root {
      --primary: #ed194d;
      --dark: #4d4d4d;
      --light: #fefefe;
    }

    body {
      background-color: var(--light);
      font-family: 'Montserrat', sans-serif;
      color: var(--dark);
      margin: 0;
      padding: 0;
    }

    /* -----------------------------------------------------------------------
       Barra de navegación — copiada 1:1 de estadio.html
    ----------------------------------------------------------------------- */
    .ta-navbar {
      background-color: var(--light);
      border-bottom: 1px solid #eaeaea;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .ta-logo {
      height: 38px;
    }

    .ta-nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .ta-nav-link {
      font-weight: 600;
      font-size: 12pt;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .ta-nav-link:hover {
      color: var(--primary);
    }

    .ta-btn-ingresar {
      background-color: var(--primary);
      color: var(--light);
      font-weight: 600;
      font-size: 12pt;
      border: none;
      border-radius: 8px;
      padding: 8px 24px;
      cursor: pointer;
    }

    .ta-nav-profile {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .ta-nav-profile i {
      font-size: 1.3rem;
      color: #999;
    }

    /* -----------------------------------------------------------------------
       Banner del partido — idéntico a estadio.html
    ----------------------------------------------------------------------- */
    .ta-match-bar {
      background-color: var(--primary);
      padding: 14px 40px;
    }

    .ta-bar-inner {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .ta-bar-flags {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ta-flag-img {
      width: 44px;
      height: 28px;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(255, 255, 255, 0.2);
    }

    .ta-flag-placeholder {
      width: 44px;
      height: 28px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .ta-bar-vs {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12pt;
    }

    .ta-bar-sep {
      width: 1.5px;
      height: 48px;
      background-color: rgba(255, 255, 255, 0.3);
    }

    .ta-bar-info { color: white; }
    .ta-bar-dt { font-weight: 600; font-size: 13pt; margin-bottom: 2px; }
    .ta-bar-venue { font-size: 10.5pt; opacity: 0.9; }
    .ta-bar-city { font-size: 9.5pt; opacity: 0.7; }

    /* -----------------------------------------------------------------------
       Encabezado de sección: botón volver + título del sector
    ----------------------------------------------------------------------- */
    .ta-sec-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 40px 0;
    }

    .ta-btn-volver {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1.5px solid var(--dark);
      background: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 10.5pt;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .ta-btn-volver:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .ta-sector-titulo {
      font-family: 'Nulshock', 'Montserrat', sans-serif;
      font-size: 14pt;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--dark);
      text-transform: uppercase;
    }

    /* -----------------------------------------------------------------------
       Layout principal: columna grilla | columna tabla detalle
    ----------------------------------------------------------------------- */
    .ta-main {
      display: flex;
      gap: 0;
      padding: 24px 40px 40px;
    }

    /* Columna izquierda: mapa de asientos */
    .ta-seats-col {
      flex: 1.4;
      padding-right: 40px;
      border-right: 1px solid #efefef;
      min-width: 0;
    }

    /* Columna derecha: tabla de detalle + botón continuar */
    .ta-panel-col {
      flex: 1;
      padding-left: 40px;
      min-width: 0;
    }

    /* -----------------------------------------------------------------------
       Grilla de asientos (tribuna)
    ----------------------------------------------------------------------- */

    /* Contenedor principal de la grilla — aspecto de tribuna inclinada */
    .grilla-asientos {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: #f4f4f4;
      border-radius: 18px;
      padding: 28px 32px 28px 20px;
      /* Perspectiva sutil para darle aspecto de tribuna */
      transform: perspective(600px) rotateX(6deg);
      transform-origin: bottom center;
      box-shadow: 0 8px 28px rgba(0,0,0,0.07);
    }

    /* Cada fila de la grilla */
    .fila-asientos {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Etiqueta de fila (letra A, B, C...) */
    .etiqueta-fila {
      font-size: 8pt;
      font-weight: 700;
      color: #999;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Botón individual de asiento */
    .btn-asiento {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: none;
      font-size: 8pt;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-asiento:hover:not(:disabled) {
      transform: scale(1.12);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    /* Estado: disponible (gris medio) */
    .btn-disponible {
      background-color: #c8c8c8;
      color: #555;
    }

    /* Estado: seleccionado (primary — rosa/rojo) */
    .btn-seleccionado {
      background-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 0 2px rgba(237, 25, 77, 0.35);
    }

    /* Estado: ocupado (gris claro, no clickeable) */
    .btn-ocupado {
      background-color: #e8e8e8;
      color: #ccc;
      cursor: default;
    }

    /* -----------------------------------------------------------------------
       Leyenda debajo del mapa
    ----------------------------------------------------------------------- */
    .ta-legend {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-top: 24px;
    }

    .ta-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10pt;
      color: var(--dark);
    }

    .ta-leg-box {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }

    /* -----------------------------------------------------------------------
       Tabla de detalle de selección — misma estética que estadio.html
    ----------------------------------------------------------------------- */

    /* Encabezado de columnas */
    .ta-table-hdr {
      display: flex;
      align-items: center;
      padding: 0 10px 12px;
      font-weight: 600;
      font-size: 10.5pt;
      color: #999;
      border-bottom: 2px solid #efefef;
      margin-bottom: 12px;
    }

    /* Proporciones de columnas */
    .tr-asiento  { flex: 1.6; }
    .tr-fila     { flex: 1;   text-align: center; }
    .tr-qty      { flex: 1.6; text-align: center; }
    .tr-price    { flex: 2;   text-align: right; font-weight: 600; color: var(--dark); }
    .tr-cart     { width: 40px; text-align: right; }

    /* Cuerpo de la tabla — renderizado dinámicamente por seating.js */
    #tabla-detalle-body {
      display: flex;
      flex-direction: column;
      gap: 0; /* las filas del tbody usan los margin de ta-detalle-fila */
    }

    /* Fila de detalle individual */
    .ta-detalle-fila {
      display: flex;
      align-items: center;
      border: 2px solid #b3b3b3;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 10px;
      font-size: 11pt;
      transition: border-color 0.2s;
    }

    .ta-detalle-fila td {
      /* Reseteamos el padding de td para que tome el del flex-item */
      padding: 0;
      border: none;
    }

    /* Botón carrito dentro de la fila de detalle */
    .ta-cart-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .ta-cart-btn i {
      font-size: 1.3rem;
    }

    /* Línea de total */
    .ta-total-line {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      font-weight: 700;
      font-size: 12pt;
      color: var(--dark);
      padding-right: 10px;
    }

    /* -----------------------------------------------------------------------
       Botón Continuar
    ----------------------------------------------------------------------- */
    .ta-continuar-wrap {
      margin-top: 16px;
      padding-top: 10px;
    }

    .ta-btn-continuar {
      width: 100%;
      background-color: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 13pt;
      border: none;
      border-radius: 50px;
      padding: 14px 0;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .ta-btn-continuar:hover:not(:disabled) {
      opacity: 0.9;
    }

    .ta-btn-continuar:disabled {
      background-color: #ccc;
      cursor: default;
    }

    /* -----------------------------------------------------------------------
       Footer — idéntico a estadio.html
    ----------------------------------------------------------------------- */
    .ta-footer {
      background-color: var(--primary);
      padding: 40px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ta-footer-logo {
      height: 38px;
    }

    .ta-footer-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }

    .ta-footer-link {
      font-weight: 600;
      font-size: 11pt;
      color: white;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .ta-footer-link:hover {
      opacity: 0.8;
      color: white;
    }

    /* -----------------------------------------------------------------------
       Responsive (mismo breakpoint 900px que estadio.html)
    ----------------------------------------------------------------------- */
    @media (max-width: 900px) {
      .ta-main {
        flex-direction: column;
        padding: 20px;
      }

      .ta-seats-col {
        padding-right: 0;
        border-right: none;
        border-bottom: 1px solid #efefef;
        padding-bottom: 28px;
        margin-bottom: 28px;
      }

      .ta-panel-col {
        padding-left: 0;
      }

      .ta-sec-header {
        padding: 16px 20px 0;
      }

      .ta-footer {
        padding: 30px 40px;
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }

      .ta-footer-links {
        align-items: center;
      }

      /* En móvil la perspectiva queda más suave */
      .grilla-asientos {
        transform: none;
        padding: 20px 16px;
      }
    }
  </style>
</head>

<body>

  <!-- Barra de navegación -->
  <nav class="ta-navbar" role="navigation" aria-label="Navegación principal">
    <a href="partidos.html"><img src="img/LogoTicketApp.png" alt="TicketApp" class="ta-logo"></a>
    <div class="ta-nav-links">
      <a href="partidos.html" class="ta-nav-link">Calendario</a>
      <a href="perfil.html" class="ta-nav-link">Mis entradas</a>
      <a href="carrito.html" class="ta-nav-link" aria-label="Carrito de compras">
        <i class="bi bi-cart" style="font-size: 1.3rem;"></i>
      </a>
      <button class="ta-btn-ingresar" type="button">Ingresar</button>
      <div class="ta-nav-profile" role="button" aria-label="Perfil">
        <i class="bi bi-person-fill"></i>
      </div>
    </div>
  </nav>

  <!-- Banner con información del partido (se rellena con JS desde matches.js) -->
  <div class="ta-match-bar" id="match-bar" aria-label="Información del partido"></div>

  <!-- Encabezado: botón Volver + título del sector -->
  <div class="ta-sec-header">
    <a href="#" id="btn-volver" class="ta-btn-volver" aria-label="Volver al mapa del estadio">
      <i class="bi bi-chevron-left"></i> Volver
    </a>
    <span class="ta-sector-titulo" id="sector-titulo">SECTOR —</span>
  </div>

  <!-- Sección principal -->
  <main class="ta-main" aria-label="Selección de asientos">

    <!-- Columna izquierda: grilla de asientos -->
    <section class="ta-seats-col" aria-label="Mapa de asientos del sector">

      <!-- Contenedor donde seating.js pinta la grilla dinámica -->
      <div id="contenedor-grilla" role="group" aria-label="Grilla de asientos"></div>

      <!-- Leyenda de estados -->
      <div class="ta-legend" role="list" aria-label="Leyenda de estados de asientos">
        <div class="ta-legend-item" role="listitem">
          <span class="ta-leg-box" style="background-color:#e8e8e8; border:1px solid #d0d0d0;"></span>
          No disponible
        </div>
        <div class="ta-legend-item" role="listitem">
          <span class="ta-leg-box" style="background-color:#c8c8c8; border:1px solid #b3b3b3;"></span>
          Disponible
        </div>
        <div class="ta-legend-item" role="listitem">
          <span class="ta-leg-box" style="background-color:var(--primary);"></span>
          Tickets seleccionados
        </div>
      </div>
    </section>

    <!-- Columna derecha: tabla de detalle + botón continuar -->
    <aside class="ta-panel-col" aria-label="Detalle de selección">

      <!-- Encabezado de columnas de la tabla -->
      <div class="ta-table-hdr" role="row">
        <div class="tr-asiento">Asiento</div>
        <div class="tr-fila">Fil</div>
        <div class="tr-qty">Cantidad</div>
        <div class="tr-price">Precio</div>
        <div class="tr-cart"></div>
      </div>

      <!--
        Cuerpo de la tabla: seating.js · renderizarResumenSeleccion()
        rellena este div con filas de clase .ta-detalle-fila.
        Usamos un div en lugar de un <table>/<tbody> para mantener
        la mismísima estética flex de estadio.html.
      -->
      <div id="tabla-detalle-body" role="list" aria-label="Asientos seleccionados"></div>

      <!-- Total -->
      <div class="ta-total-line">
        Total: <span id="precio-total">$0</span>
      </div>

      <!-- Botón continuar (deshabilitado hasta que haya al menos 1 seleccionado) -->
      <div class="ta-continuar-wrap">
        <button
          class="ta-btn-continuar"
          id="btn-continuar"
          type="button"
          disabled
          aria-label="Continuar con la compra"
        >Continuar</button>
      </div>

    </aside>
  </main>

  <!-- Footer -->
  <footer class="ta-footer" role="contentinfo">
    <img src="img/logoticketappblanco.png" alt="TicketApp" class="ta-footer-logo">
    <div class="ta-footer-links">
      <a href="partidos.html" class="ta-footer-link">Calendario</a>
      <a href="perfil.html" class="ta-footer-link">Mis entradas</a>
      <a href="carrito.html" class="ta-footer-link">Entradas</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!--
    Script de inicialización de asientos.html.
    Usa type="module" para poder importar seating.js y matches.js con ES6 import/export.
    Todo el DOM de asientos se arma aquí mismo, siguiendo el mismo patrón
    que main.js de referencia provisto por la cátedra.
  -->
  <script type="module">
    /* ------------------------------------------------------------------
       Importamos funciones del módulo de asientos (Persona 4)
    ------------------------------------------------------------------ */
    import {
      generarAsientosMock,
      inicializarAsientos,
      renderizarListaAsientos,
      renderizarResumenSeleccion,
      inicializarSincronizacion,
    } from './assets/js/modules/seating.js';

    /* ------------------------------------------------------------------
       1. Leemos los parámetros de la URL
          - sector = ID del sector SVG elegido en estadio.html (ej: "A11")
          - partido = ID del partido (para reutilizar el banner del match)
    ------------------------------------------------------------------ */
    const params     = new URLSearchParams(location.search);
    const idSector   = params.get('sector') || 'A1';   // por defecto A1
    const idPartido  = params.get('partido') || '';

    /* ------------------------------------------------------------------
       2. Título dinámico del sector
    ------------------------------------------------------------------ */
    const tituloEl = document.getElementById('sector-titulo');
    if (tituloEl) tituloEl.textContent = `SECTOR ${idSector}`;

    /* ------------------------------------------------------------------
       3. Botón "Volver" → regresa a estadio.html conservando el partido
    ------------------------------------------------------------------ */
    const btnVolver = document.getElementById('btn-volver');
    if (btnVolver) {
      const urlVolver = idPartido
        ? `estadio.html?partido=${idPartido}`
        : 'estadio.html';
      btnVolver.href = urlVolver;
    }

    /* ------------------------------------------------------------------
       4. Banner del partido (reutilizamos la lógica de matches.js).
          matches.js escucha 'DOMContentLoaded' y detecta si existe
          el elemento #match-bar para renderizarlo. Como ya está en el
          DOM al cargar esta página, funciona automáticamente.
          Solo necesitamos pasar el parámetro 'partido' en la URL, que
          ya existe porque se lo pasamos desde estadio.html.
    ------------------------------------------------------------------ */

    /* ------------------------------------------------------------------
       5. Inicializamos los asientos del sector en memoria
    ------------------------------------------------------------------ */
    inicializarAsientos(null, idSector);

    /* ------------------------------------------------------------------
       6. Referencias a los elementos del DOM
    ------------------------------------------------------------------ */
    const contenedorGrilla  = document.getElementById('contenedor-grilla');
    const tablaDetalleCuerpo = document.getElementById('tabla-detalle-body');
    const totalEl            = document.getElementById('precio-total');
    const btnContinuar       = document.getElementById('btn-continuar');

    /* ------------------------------------------------------------------
       7. Función que actualiza el resumen de selección (tabla derecha).
          Se llama cada vez que el usuario hace click en un asiento,
          o cuando llega un evento 'storage' de otra pestaña.
    ------------------------------------------------------------------ */
    function actualizarResumen() {
      renderizarResumenSeleccion(tablaDetalleCuerpo, totalEl, btnContinuar, {
        onQuitarAsiento: () => {
          // Al quitar un asiento desde la tabla, re-pintamos la grilla
          // completa para reflejar el cambio en el botón correspondiente.
          renderizarListaAsientos(contenedorGrilla, idSector, {
            onCambioSeleccion: actualizarResumen,
          });
          actualizarResumen();
        },
      });
    }

    /* ------------------------------------------------------------------
       8. Pintamos la grilla de asientos por primera vez
    ------------------------------------------------------------------ */
    renderizarListaAsientos(contenedorGrilla, idSector, {
      onCambioSeleccion: actualizarResumen,
    });

    /* ------------------------------------------------------------------
       9. Pintamos el resumen inicial (vacío, con botón deshabilitado)
    ------------------------------------------------------------------ */
    actualizarResumen();

    /* ------------------------------------------------------------------
       10. Activamos la sincronización entre pestañas
    ------------------------------------------------------------------ */
    inicializarSincronizacion({
      onSincronizar: () => {
        // Cuando otra pestaña cambia la selección, re-renderizamos todo
        renderizarListaAsientos(contenedorGrilla, idSector, {
          onCambioSeleccion: actualizarResumen,
        });
        actualizarResumen();
      },
    });

    /* ------------------------------------------------------------------
       11. Botón "Continuar" (placeholder: en la siguiente fase navega
           al carrito o al checkout real)
    ------------------------------------------------------------------ */
    if (btnContinuar) {
      btnContinuar.addEventListener('click', () => {
        // TODO (Persona 4 — Fase 2): navegar a carrito.html pasando
        // los IDs de los asientos seleccionados.
        // Por ahora confirmamos la selección con una alerta visual.
        alert('¡Asientos reservados! En la próxima fase se completará el carrito.');
      });
    }
  </script>

  <!--
    matches.js se incluye SIN type="module" para mantener exactamente
    el mismo patrón que en estadio.html y así el banner del partido
    se renderice igual que allá (escucha DOMContentLoaded internamente).
  -->
  <script src="assets/js/modules/matches.js"></script>

</body>

</html>
