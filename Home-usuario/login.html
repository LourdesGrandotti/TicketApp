<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketApp - Iniciar Sesión</title>
    <!-- Favicon -->
    <link rel="icon" href="Imagenes/TicketApp.png" type="image/png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="CSS y JS/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <!-- Tarjeta centrada para el formulario de login -->
    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-4">
            <img src="Imagenes/TicketApp.png" alt="Logo TicketApp" class="img-fluid mb-3" width="180">
            <h4 class="fw-bold">Iniciar Sesión</h4>
            <p class="text-muted small">Ingresa a tu cuenta para comprar entradas</p>
        </div>

        <form id="login-form">
            <!-- Campo de Email -->
            <div class="mb-3">
                <label for="email" class="form-label small fw-bold">Correo Electrónico</label>
                <input type="email" class="form-control rounded-3" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <!-- Campo de Contraseña -->
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Contraseña</label>
                <input type="password" class="form-control rounded-3" id="password" placeholder="••••••••" required>
            </div>
            <!-- Botón de Envío -->
            <button type="submit" class="btn btn-brand w-100 fw-bold py-2 rounded-3">Ingresar</button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-muted small text-decoration-none">Volver al inicio</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        // Lógica para simular el inicio de sesión
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault(); // Evitamos que el formulario recargue la página por defecto

                // Guardamos en el localStorage que el usuario ha iniciado sesión
                localStorage.setItem('isLoggedIn', 'true');

                // Redirigimos de vuelta a la página principal (index.html)
                window.location.href = 'index.html';
            });
        }
    </script>
</body>

</html>
